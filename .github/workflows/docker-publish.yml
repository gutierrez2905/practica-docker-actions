name: CI/CD Pipeline con Docker

on:
  push:
    branches: [ "main" ] # Se ejecuta cuando subes código a la rama main

jobs:
  build-test-and-push:
    runs-on: ubuntu-latest

    steps:
    # 1. Clona tu repositorio
    - name: Checkout del código
      uses: actions/checkout@v4

    # 2. Prepara Python
    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    # 3. Instala dependencias
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Ejecuta pruebas unitarias y calcula métrica de cobertura
    - name: Pruebas unitarias y métricas
      run: |
        pytest --cov=app test_app.py

    # 5. Muestra la ejecución de tu código
    - name: Ejecutar código de la app
      run: python app.py

    # 6. Inicia sesión en Docker Hub
    - name: Login en Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 7. Construye y empuja la imagen a Docker Hub
    - name: Construir e insertar imagen en Docker Hub
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/mi-practica-app:latest
